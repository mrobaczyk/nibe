name: Update NIBE Data
on:
  workflow_dispatch: # Pozwala uruchomić ręcznie
  #schedule:
  #  - cron: '*/5 * * * *' # Co 5 minut

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install requests
      - name: Fetch Data
        env:
          NIBE_CLIENT_ID: ${{ secrets.NIBE_CLIENT_ID }}
          NIBE_CLIENT_SECRET: ${{ secrets.NIBE_CLIENT_SECRET }}
        run: python scripts/fetch_nibe.py
      - name: Commit and push
        run: |
          git config --global user.name "NIBE Bot"
          git config --global user.email "bot@github.com"

          git add data.json hourly_stats.json
          git commit -m "Update NIBE data and hourly stats" || echo "No changes to commit"

          git pull --rebase origin main
          git push origin main
