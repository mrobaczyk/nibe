<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIBE PRO Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-container { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-8 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">NIBE Heat Pump Intelligence</h1>
                <p id="last-update" class="text-slate-500 text-sm italic">Ładowanie danych...</p>
            </div>
            <div id="stats-summary" class="flex gap-4 text-right">
                </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="chart-container">
                <h2 class="text-sm font-semibold mb-2 text-blue-300">Temperatury CO (°C)</h2>
                <canvas id="chartCO"></canvas>
            </div>

            <div class="chart-container">
                <h2 class="text-sm font-semibold mb-2 text-red-300">Ciepła Woda Użytkowa (°C)</h2>
                <canvas id="chartCWU"></canvas>
            </div>

            <div class="chart-container">
                <h2 class="text-sm font-semibold mb-2 text-green-300">Sprężarka i Pompy</h2>
                <canvas id="chartWork"></canvas>
            </div>

            <div class="chart-container">
                <h2 class="text-sm font-semibold mb-2 text-yellow-300">Stopniominuty (GM)</h2>
                <canvas id="chartGM"></canvas>
            </div>

        </div>
    </div>

    <script>
        async function init() {
            const resp = await fetch('data.json?v=' + Date.now());
            const data = await resp.json();
            const latest = data[data.length - 1];
            
            document.getElementById('last-update').innerText = "Ostatni odczyt: " + latest.timestamp;

            const labels = data.map(d => d.timestamp.split(' ')[1]);

            // --- WYKRES CO ---
            renderChart('chartCO', labels, [
                { label: 'Zewn. (BT1)', data: data.map(d => d.outdoor), color: '#3b82f6' },
                { label: 'Śr. Zewn.', data: data.map(d => d.outdoor_avg), color: '#60a5fa', dashed: true },
                { label: 'Zasilanie (BT2)', data: data.map(d => d.flow), color: '#ef4444' },
                { label: 'Obliczona', data: data.map(d => d.calc_flow), color: '#eab308' },
                { label: 'Rura cieczowa', data: data.map(d => d.liquid_line), color: '#f97316' },
                { label: 'Pokój (BT50)', data: data.map(d => d.room_temp), color: '#a855f7' }
            ]);

            // --- WYKRES CWU ---
            renderChart('chartCWU', labels, [
                { label: 'Góra (BT7)', data: data.map(d => d.cwu_upper), color: '#ec4899' },
                { label: 'Ładowanie (BT6)', data: data.map(d => d.cwu_load), color: '#fb7185' }
            ]);

            // --- WYKRES PRACY (Dwie osie: Hz i %) ---
            renderChart('chartWork', labels, [
                { label: 'Sprężarka (Hz)', data: data.map(d => d.compressor_hz), color: '#10b981' },
                { label: 'Pompa Obieg. (%)', data: data.map(d => d.pump_speed), color: '#06b6d4' }
            ]);

            // --- WYKRES GM ---
            renderChart('chartGM', labels, [
                { label: 'Stopniominuty', data: data.map(d => d.degree_minutes), color: '#facc15', fill: true }
            ]);

            calculateStats(data);
        }

        function renderChart(id, labels, datasets) {
            new Chart(document.getElementById(id), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets.map(ds => ({
                        label: ds.label,
                        data: ds.data,
                        borderColor: ds.color,
                        borderDash: ds.dashed ? [5, 5] : [],
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: ds.fill ? {target: 'origin', above: ds.color + '22'} : false
                    }))
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 10, font: { size: 10 } } } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#475569', maxRotation: 0 } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#475569' } }
                    }
                }
            });
        }

        function calculateStats(data) {
            // Statystyki z ostatnich 30 dni (uproszczone)
            const first = data[0];
            const last = data[data.length - 1];
            const starts = last.starts_total - first.starts_total;
            const hours = last.hours_total - first.hours_total;

            document.getElementById('stats-summary').innerHTML = `
                <div><p class="text-xs text-slate-500 uppercase">Uruchomienia (okres)</p><p class="text-xl font-bold text-green-400">${starts}</p></div>
                <div><p class="text-xs text-slate-500 uppercase">Czas pracy (h)</p><p class="text-xl font-bold text-blue-400">${hours}</p></div>
            `;
        }

        init();
    </script>
</body>
</html>
