<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 450px), 1fr)); gap: 1.5rem; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1.25rem; height: 380px; }
        .kpi-card { background: #0f172a; border: 1px solid #1e293b; padding: 1rem; border-radius: 0.75rem; }
        .active-btn { background-color: #2563eb !important; color: white !important; border-color: #3b82f6 !important; }
        body { font-size: 14px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-3 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight uppercase italic text-blue-500">NIBE <span class="text-white">monitor</span></h1>
                <p id="update-info" class="text-slate-400 font-mono text-xs mt-1 italic font-bold"></p>
            </div>
            <div class="flex bg-slate-900 p-1.5 rounded-xl border border-slate-800 shadow-xl" id="filter-group">
                <button class="px-5 py-2 rounded-lg text-sm font-bold transition text-slate-400" data-hrs="1">1H</button>
                <button class="px-5 py-2 rounded-lg text-sm font-bold transition text-slate-400 active-btn" data-hrs="6">6H</button>
                <button class="px-5 py-2 rounded-lg text-sm font-bold transition text-slate-400" data-hrs="24">24H</button>
                <button class="px-5 py-2 rounded-lg text-sm font-bold transition text-slate-400" data-hrs="168">7D</button>
                <button class="px-5 py-2 rounded-lg text-sm font-bold transition text-slate-400" data-hrs="720">30D</button>
            </div>
        </header>

        <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8"></div>

        <div class="chart-grid">
            <div class="card"><canvas id="c-temp"></canvas></div>
            <div class="card"><canvas id="c-flow"></canvas></div>
            <div class="card"><canvas id="c-cwu"></canvas></div>
            <div class="card"><canvas id="c-hz"></canvas></div>
            <div class="card"><canvas id="c-gm"></canvas></div>
            <div class="card"><canvas id="c-stats"></canvas></div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let rawData = [];
        let charts = {};
        let currentHrs = 6;

        const cwuNames = { 0: "Oszczędny", 1: "Normalny", 2: "Luksus" };

        async function load() {
            try {
                const r = await fetch('data.json?nocache=' + Date.now());
                rawData = await r.json();
                updateDashboard(currentHrs);
            } catch (e) { console.error("Błąd ładowania:", e); }
        }

        function updateDashboard(hrs) {
            currentHrs = hrs;
            if (!rawData.length) return;

            const filtered = rawData.filter(d => new Date(d.timestamp + " UTC").getTime() >= (new Date(rawData[rawData.length-1].timestamp + " UTC").getTime() - (hrs * 60 * 60 * 1000)));
            const last = filtered[filtered.length - 1];

            document.getElementById('update-info').innerText = `OSTATNI ODCZYT: ${new Date(last.timestamp + " UTC").toLocaleString('pl-PL')}`;

            const totalH = last.op_time_total || 0;
            const cwuH = last.op_time_hotwater || 0;
            const starts = last.starts || 0;
            const ratio = starts > 0 ? (totalH / starts).toFixed(2) : 0;
            const cwuPercent = totalH > 0 ? ((cwuH / totalH) * 100).toFixed(1) : 0;

            // Poprawione mapowanie: 47007 to Krzywa, 47011 to Przesunięcie
            const curve = last.heating_curve_final !== undefined ? last.heating_curve_final : (last.heat_curve || 0);
            const offset = last.offset_final !== undefined ? last.offset_final : (last.heat_offset || 0);

            const kpis = [
                {t:'Starty', v:starts, u:ratio + ' h/start', c:'text-blue-400'},
                {t:'Czas pracy (CWU)', v:totalH + 'h (' + cwuH + 'h)', u:cwuPercent + '% CWU', c:'text-emerald-400'},
                {t:'Tryb CWU', v: cwuNames[last.cwu_mode_current] || "Normalny", u:`Góra (BT7): ${last.cwu_upper || '--'}° / Ładow. (BT6): ${last.cwu_load || '--'}°`, c:'text-pink-400'},
                {t:'Krzywa / Przesunięcie', v: curve + ' / ' + offset, u:'parametry grzania', c:'text-yellow-400'},
                {t:'Defrost', v:last.defrosting == 1 ? 'AKTYWNY' : 'NIE', u:'', c:last.defrosting == 1 ? 'text-red-500 font-black' : 'text-slate-600'},
                {t:'Temp Lux', v:last.temp_lux == 1 ? 'ON' : 'OFF', u:'', c:last.temp_lux == 1 ? 'text-blue-400 font-black' : 'text-slate-600'}
            ];
            
            document.getElementById('kpi-expert').innerHTML = kpis.map(k => `
                <div class="kpi-card border border-slate-800 shadow-sm">
                    <div class="text-[10px] uppercase font-black text-slate-500 mb-1 tracking-wider">${k.t}</div>
                    <div class="text-lg font-mono font-black ${k.c}">${k.v}</div>
                    <div class="text-[10px] text-slate-400 font-bold">${k.u}</div>
                </div>
            `).join('');

            const mapData = (key) => filtered.map(d => ({ x: new Date(d.timestamp + " UTC"), y: d[key] }));

            // Linie ciągłe dla wszystkich wykresów
            draw('c-temp', `ZEWNĘTRZNA (Czas obliczania: ${last.filter_time || '--'}h)`, [{l:'Chwilowa', d:mapData('outdoor'), c:'#3b82f6'}, {l:'Średnia', d:mapData('outdoor_avg'), c:'#93c5fd'}]);
            draw('c-flow', 'ZASILANIE / OBLICZONA (°C)', [{l:'Obliczona', d:mapData('calc_flow'), c:'#eab308'}, {l:'BT25 Zewn.', d:mapData('bt25_temp'), c:'#f87171'}]);
            draw('c-cwu', 'CIEPŁA WODA (°C)', [{l:'Góra BT7', d:mapData('cwu_upper'), c:'#ec4899'}, {l:'Ładowanie BT6', d:mapData('cwu_load'), c:'#fb7185'}]);
            draw('c-hz', 'SPRĘŻARKA I POMPA GP1', [{l:'Sprężarka (Hz)', d:mapData('compressor_hz'), c:'#10b981'}, {l:'Pompa GP1 (%)', d:mapData('pump_speed'), c:'#6366f1'}]);
            draw('c-gm', 'STOPNIOMINUTY (GM)', [{l:'GM', d:mapData('degree_minutes'), c:'#facc15', fill:true}, {l:'Start', d:mapData('start_gm_level'), c:'#ef4444', pointRadius:0}], true);
            draw('c-stats', 'LICZBA STARTÓW I CZAS PRACY', [{l:'Starty', d:mapData('starts'), c:'#3b82f6'}, {l:'Czas pracy (h)', d:mapData('op_time_total'), c:'#10b981'}]);
        }

        function draw(id, title, datasets, showZero = false) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type:'line',
                data: { datasets: datasets.map(s => ({
                    label:s.l, data:s.d, borderColor:s.c, backgroundColor:s.c+(s.fill?'22':'00'),
                    pointRadius: currentHrs > 48 ? 0 : 3, tension:0.3, borderWidth:2.5, spanGaps: true,
                    fill:s.fill || false
                }))},
                options: {
                    responsive:true, maintainAspectRatio:false,
                    layout: { padding: { right: 55, top: 10, left: 10 } },
                    plugins: { 
                        title:{display:true, text:title.toUpperCase(), color:'#fff', font:{size:13, weight:'bold'}, padding:15},
                        legend:{position:'bottom', labels:{color:'#94a3b8', boxWidth:12, font:{size:11}, padding:15}},
                        datalabels: {
                            align: 'right', anchor: 'end', offset: 8, color: (ctx)=>ctx.dataset.borderColor,
                            font: { size: 12, weight: 'bold' }, clip: false,
                            formatter: (v, ctx) => ctx.dataIndex === ctx.dataset.data.length - 1 ? v.y : null
                        }
                    },
                    scales: { 
                        x: { type: 'time', time: { unit: currentHrs <= 24 ? 'hour' : 'day', displayFormats: { hour: 'HH:mm', day: 'dd.MM' } }, ticks: { color: '#64748b', font: { size: 11 }, maxTicksLimit: 7 }, grid: { display: false } },
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 11 }, padding: 8 }, suggestedMin: showZero ? -150 : undefined }
                    }
                }
            });
        }

        document.getElementById('filter-group').onclick = (e) => {
            const btn = e.target.closest('button');
            if(!btn) return;
            document.querySelectorAll('#filter-group button').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            updateDashboard(parseInt(btn.dataset.hrs));
        };

        load();
        setInterval(load, 300000);
    </script>
</body>
</html>
