<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE Monitor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-3 md:p-6 font-sans">
    <div class="max-w-[1600px] mx-auto"> 
        <header class="sticky-header flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 px-4 mb-8">
			<div class="flex flex-col md:flex-row md:items-center gap-6">
				<div>
					<h1 class="text-3xl font-black text-blue-500 tracking-tight uppercase italic leading-none">NIBE <span class="text-white">monitor</span></h1>
				</div>
				<div id="update-info" class="text-slate-400 font-mono text-[10px] italic font-bold min-w-[200px] border-l border-slate-800 pl-4"></div>
			</div>
		
			<div class="flex items-center gap-3">
				<div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 shadow-xl h-10 items-center" id="view-selector">
					<button class="px-4 h-full rounded-lg text-[10px] font-black transition active-btn uppercase" data-view="live">LIVE</button>
					<button class="px-4 h-full rounded-lg text-[10px] font-black transition text-slate-500 uppercase" data-view="stats">Analityka</button>
				</div>
		
				<div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 shadow-xl h-10 items-center" id="filter-group">
					<button class="filter-btn h-full px-3 text-[10px] font-black" data-hrs="1">1h</button>
					<button class="filter-btn active-btn h-full px-3 text-[10px] font-black" data-hrs="6">6h</button>
					<button class="filter-btn h-full px-3 text-[10px] font-black" data-hrs="24">24h</button>
					<button class="filter-btn h-full px-3 text-[10px] font-black" data-hrs="168">7d</button>
					<button class="filter-btn h-full px-3 text-[10px] font-black" data-hrs="720">30d</button>
				</div>
			</div>
		</header>

        <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 mb-4"></div>
        
        <div id="kpi-trends" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6 opacity-80"></div>
        <div id="live-view" class="chart-grid">
            <div class="card"><canvas id="c-stats"></canvas></div>
            <div class="card"><canvas id="c-energy"></canvas></div>
            <div class="card"><canvas id="c-temp"></canvas></div>
            <div class="card"><canvas id="c-curve"></canvas></div>
            <div class="card"><canvas id="c-gm"></canvas></div>
            <div class="card"><canvas id="c-hz"></canvas></div>
            <div class="card"><canvas id="c-flow"></canvas></div>
            <div class="card"><canvas id="c-cwu-mode"></canvas></div>
            <div class="card"><canvas id="c-cwu"></canvas></div>
        </div>

        <div id="stats-view" class="chart-grid hidden">
			<div class="col-span-full flex justify-end mb-4">
				<div class="flex bg-slate-900 p-1 rounded-lg border border-slate-800" id="aggregation-selector">
					<button class="px-3 py-1 text-xs font-bold active-btn" data-type="daily">DNI</button>
					<button class="px-3 py-1 text-xs font-bold text-slate-500" data-type="monthly">MIESIĄCE</button>
				</div>
			</div>
			
			<div class="card h-[400px]"><canvas id="c-daily-energy"></canvas></div>
			<div class="card h-[400px]"><canvas id="c-daily-starts"></canvas></div>
			<div class="card h-[400px]"><canvas id="c-daily-work"></canvas></div>
		</div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
