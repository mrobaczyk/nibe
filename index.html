<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE F2040 Expert</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr)); gap: 1.5rem; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 1rem; padding: 1rem; height: 380px; }
        .kpi-card { background: rgba(17, 24, 39, 0.7); border: 1px solid #1f2937; padding: 1rem; border-radius: 1rem; }
        .active-btn { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-black text-slate-200 p-3 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">NIBE <span class="text-blue-500">Expert</span></h1>
                <p id="update-info" class="text-slate-500 font-mono text-[10px] mt-1 italic"></p>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 overflow-x-auto" id="filter-group">
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white" data-hrs="1">1H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white active-btn" data-hrs="6">6H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white" data-hrs="24">24H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white" data-hrs="168">7D</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:text-white" data-hrs="720">30D</button>
            </div>
        </header>

        <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 mb-8"></div>

        <div class="chart-grid">
            <div class="card"><canvas id="c-temp"></canvas></div>
            <div class="card"><canvas id="c-flow"></canvas></div>
            <div class="card"><canvas id="c-cwu"></canvas></div>
            <div class="card"><canvas id="c-sys"></canvas></div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let rawData = [];
        let charts = {};

        // Funkcja konwertująca UTC z JSONa na czas lokalny przeglądarki
        function toLocalTime(utcString) {
            const date = new Date(utcString + " UTC");
            return date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        }

        async function start() {
            const r = await fetch('data.json?t=' + Date.now());
            rawData = await r.json();
            render(6); // Domyślnie 6h
        }

        function render(hrs) {
            // Zakładamy odczyt co 5 min -> 12 punktów na godzinę
            const numPoints = hrs * 12;
            const d = rawData.slice(-numPoints);
            if (d.length === 0) return;

            const last = d[d.length - 1];
            document.getElementById('update-info').innerText = `Ostatni odczyt (Local): ${toLocalTime(last.timestamp)} | Parametry: ${Object.keys(last).length}`;

            // KPI
            const cwuPercent = last.op_time_total > 0 ? ((last.op_time_hotwater / last.op_time_total) * 100).toFixed(1) : 0;
            const kpis = [
                {t:'Starty', v:last.starts, u:'', c:'text-blue-400'},
                {t:'Praca (CWU %)', v:last.op_time_total+'h', u:cwuPercent+'%', c:'text-emerald-400'},
                {t:'Krzywa (Offs)', v:last.heat_curve, u:last.heat_offset, c:'text-yellow-400'},
                {t:'Odszranianie', v:last.defrosting == 1 ? 'TAK' : 'NIE', u:'', c:last.defrosting == 1 ? 'text-red-500' : 'text-slate-600'},
                {t:'Temp Lux', v:last.temp_lux == 1 ? 'ON' : 'OFF', u:'', c:last.temp_lux == 1 ? 'text-blue-400' : 'text-slate-600'}
            ];
            document.getElementById('kpi-expert').innerHTML = kpis.map(k => `
                <div class="kpi-card border border-slate-800">
                    <div class="text-[9px] uppercase font-bold text-slate-500 mb-1">${k.t}</div>
                    <div class="text-base font-mono font-bold ${k.c}">${k.v}</div>
                    <div class="text-[9px] text-slate-400">${k.u}</div>
                </div>
            `).join('');

            // Labele czasu (lokalne)
            const labels = d.map(x => hrs > 48 ? x.timestamp.split(' ')[0] : toLocalTime(x.timestamp));

            // Wykresy
            plot('c-temp', `ZEWNĘTRZNA (Filtr: ${last.filter_time}h)`, labels, [
                {l:'Chwilowa', d:d.map(x=>x.outdoor), c:'#3b82f6'},
                {l:'Średnia', d:d.map(x=>x.outdoor_avg), c:'#93c5fd', dashed:true}
            ]);

            plot('c-flow', 'ZASILANIE (°C)', labels, [
                {l:'Obliczona', d:d.map(x=>x.calc_flow), c:'#eab308', dashed:true},
                {l:'BT25 (Zewn)', d:d.map(x=>x.bt25_temp), c:'#ef4444'},
                {l:'BT2 (Wewn)', d:d.map(x=>x.flow), c:'#f87171'}
            ]);

            plot('c-cwu', 'CIEPŁA WODA (°C)', labels, [
                {l:'Góra BT7', d:d.map(x=>x.cwu_upper), c:'#ec4899'},
                {l:'Ładowanie BT6', d:d.map(x=>x.cwu_load), c:'#fb7185'}
            ]);

            plot('c-sys', 'SYSTEM', labels, [
                {l:'Sprężarka Hz', d:d.map(x=>x.compressor_hz), c:'#10b981'},
                {l:'GM', d:d.map(x=>x.degree_minutes), c:'#facc15'}
            ]);
        }

        function plot(id, title, labels, sets) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type:'line',
                data: {
                    labels: labels,
                    datasets: sets.map(s => ({
                        label:s.l, data:s.d, borderColor:s.c, backgroundColor:s.c+'11',
                        pointRadius: labels.length > 200 ? 0 : 2, 
                        tension:0.3, borderWidth:2, spanGaps: true,
                        fill:false, borderDash: s.dashed ? [4,4] : []
                    }))
                },
                options: {
                    responsive:true, maintainAspectRatio:false,
                    layout: { padding: { right: 35, top: 20 } },
                    plugins: { 
                        title:{display:true, text:title, color:'#fff', font:{size:12}},
                        legend:{display:true, position:'bottom', labels:{color:'#64748b', boxWidth:8, font:{size:10}}},
                        datalabels: {
                            align: 'top', anchor: 'end', offset: 4,
                            color: (ctx) => ctx.dataset.borderColor,
                            font: { size: 9, weight: 'bold' },
                            formatter: (val, ctx) => ctx.dataIndex === ctx.dataset.data.length - 1 ? val : null
                        }
                    },
                    scales: { 
                        x:{ ticks:{color:'#475569', font:{size:8}, maxTicksLimit:8}, grid:{display:false} },
                        y:{ grid:{color:'#1f2937'}, ticks:{color:'#475569', font:{size:8}} }
                    }
                }
            });
        }

        document.getElementById('filter-group').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if(!btn) return;
            document.querySelectorAll('#filter-group button').forEach(b => b.classList.remove('active-btn'));
            btn.classList.add('active-btn');
            render(parseInt(btn.dataset.hrs));
        });

        start();
    </script>
</body>
</html>
