<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE Heat Pump Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">NIBE Monitor</h1>
                <p class="text-slate-400 text-sm">Automatyczne statystyki z myUpLink</p>
            </div>
            <div id="last-update" class="text-xs bg-slate-800 px-3 py-1 rounded text-slate-500 italic">
                Czekam na dane...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-800 p-6 rounded-xl border-l-4 border-blue-500 shadow-lg">
                <p class="text-slate-400 text-sm font-medium uppercase">Zewnątrz (BT1)</p>
                <p id="val-outdoor" class="text-4xl font-bold mt-1">-- °C</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border-l-4 border-red-500 shadow-lg">
                <p class="text-slate-400 text-sm font-medium uppercase">Zasilanie (BT2)</p>
                <p id="val-flow" class="text-4xl font-bold mt-1">-- °C</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border-l-4 border-green-500 shadow-lg">
                <p class="text-slate-400 text-sm font-medium uppercase">Status</p>
                <p id="val-status" class="text-2xl font-bold mt-2 text-green-400 font-mono uppercase tracking-widest">LIVE</p>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700">
            <canvas id="mainChart" height="120"></canvas>
        </div>

        <footer class="mt-8 text-center text-slate-600 text-xs">
            Dane pobierane automatycznie przez GitHub Actions co 30 minut.
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                // Pobieramy plik generowany przez skrypt Python
                const response = await fetch('data.json?v=' + new Date().getTime()); // v=... zapobiega cache'owaniu
                if (!response.ok) throw new Error("Brak pliku danych. Poczekaj na pierwsze uruchomienie Action.");
                
                const history = await response.json();
                
                if (history.length === 0) return;

                // Najnowszy wpis
                const latest = history[history.length - 1];
                document.getElementById('val-outdoor').innerText = latest.outdoor.toFixed(1) + " °C";
                document.getElementById('val-flow').innerText = latest.flow.toFixed(1) + " °C";
                document.getElementById('last-update').innerText = "Ostatnia aktualizacja: " + latest.timestamp;

                // Dane do wykresu
                const labels = history.map(h => h.timestamp.split(' ')[1]); // Tylko godziny
                const outdoorData = history.map(h => h.outdoor);
                const flowData = history.map(h => h.flow);

                renderChart(labels, outdoorData, flowData);

            } catch (err) {
                console.error(err);
                document.getElementById('last-update').innerText = "Błąd: " + err.message;
            }
        }

        function renderChart(labels, outdoor, flow) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Jeśli wykres już istnieje, niszczymy go przed ponownym rysowaniem
            if (window.myPumpChart) window.myPumpChart.destroy();

            window.myPumpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperatura Zewnętrzna',
                            data: outdoor,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            pointRadius: 0
                        },
                        {
                            label: 'Temperatura Zasilania',
                            data: flow,
                            borderColor: '#ef4444',
                            borderWidth: 3,
                            tension: 0.4,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                    },
                    plugins: {
                        legend: { position: 'top', labels: { color: '#f1f5f9', font: { weight: 'bold' } } }
                    }
                }
            });
        }

        // Start aplikacji
        loadData();
    </script>
</body>
</html>
