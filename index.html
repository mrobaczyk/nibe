<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE F2040 Expert</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr)); gap: 1.5rem; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 1rem; padding: 1rem; height: 380px; }
        .kpi-card { background: rgba(17, 24, 39, 0.7); border: 1px solid #1f2937; padding: 1.25rem; border-radius: 1.25rem; }
        #filter-group::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-black text-slate-200 p-3 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic">NIBE <span class="text-blue-500">Expert</span></h1>
                <p id="update-info" class="text-slate-500 font-mono text-xs mt-1">Ładowanie...</p>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 overflow-x-auto whitespace-nowrap shadow-2xl" id="filter-group">
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition" data-hrs="1">1H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition bg-blue-600 text-white" data-hrs="6">6H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition" data-hrs="24">24H</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition" data-hrs="168">7D</button>
                <button class="px-4 py-1.5 rounded-lg text-xs font-bold transition" data-hrs="720">30D</button>
            </div>
        </header>

        <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8"></div>

        <div class="chart-grid">
            <div class="card"><canvas id="c-temp"></canvas></div>
            <div class="card"><canvas id="c-flow"></canvas></div>
            <div class="card"><canvas id="c-cwu"></canvas></div>
            <div class="card"><canvas id="c-sys"></canvas></div>
        </div>
    </div>

    <script>
        // Rejestracja pluginu etykiet
        Chart.register(ChartDataLabels);

        let raw = [];
        let charts = {};

        async function start() {
            const r = await fetch('data.json?t=' + Date.now());
            raw = await r.json();
            render(6);
        }

        function render(hrs) {
            const d = raw.slice(-(hrs * 12));
            const last = d[d.length-1];
            const lbl = d.map(x => hrs > 48 ? x.timestamp.split(' ')[0] : x.timestamp.split(' ')[1]);

            document.getElementById('update-info').innerText = "Ostatnia aktualizacja: " + last.timestamp;

            const cwuPercent = last.op_time_total > 0 ? ((last.op_time_hotwater / last.op_time_total) * 100).toFixed(1) : 0;

            const kpis = [
                {t:'Starty sprężarki', v:last.starts, u:'', c:'text-blue-400'},
                {t:'Czas pracy (CWU)', v:last.op_time_total + 'h (' + last.op_time_hotwater + 'h)', u:'CWU: ' + cwuPercent + '%', c:'text-emerald-400'},
                {t:'Krzywa (Offset)', v:last.heat_curve, u:'(' + (last.heat_offset > 0 ? '+' : '') + last.heat_offset + ')', c:'text-yellow-400'},
                {t:'Odszranianie', v:last.defrosting == 1 ? 'AKTYWNE' : 'BRAK', u:'', c:last.defrosting == 1 ? 'text-red-500 animate-pulse' : 'text-slate-500'},
                {t:'Temporary Lux', v:last.temp_lux == 1 ? 'WŁĄCZONY' : 'WYŁĄCZONY', u:'', c:last.temp_lux == 1 ? 'text-blue-400' : 'text-slate-500'}
            ];

            document.getElementById('kpi-expert').innerHTML = kpis.map(k => `
                <div class="kpi-card">
                    <div class="text-[10px] uppercase font-black text-slate-500 tracking-widest mb-1">${k.t}</div>
                    <div class="text-lg font-bold ${k.c}">${k.v}</div>
                    <div class="text-[10px] text-slate-400 mt-1">${k.u}</div>
                </div>
            `).join('');

            // WYKRES 1: Temp. Zewnętrzne + Czas filtrowania
            plot('c-temp', `ZEWNĘTRZNA (Filtrowanie: ${last.filter_time}h)`, lbl, [
                {l:'Chwilowa', d:d.map(x=>x.outdoor), c:'#3b82f6'},
                {l:'Średnia', d:d.map(x=>x.outdoor_avg), c:'#93c5fd', dashed:true}
            ]);

            // WYKRES 2: Obliczona vs Realna (BT25 / BT2)
            plot('c-flow', 'ZASILANIE UKŁADU (°C)', lbl, [
                {l:'Obliczona (S1)', d:d.map(x=>x.calc_flow), c:'#eab308', dashed:true},
                {l:'Zewnętrzna BT25', d:d.map(x=>x.bt25_temp), c:'#ef4444'},
                {l:'Zasilanie BT2', d:d.map(x=>x.flow), c:'#f87171'}
            ]);

            plot('c-cwu', 'CIEPŁA WODA (BT7/BT6)', lbl, [
                {l:'Góra (BT7)', d:d.map(x=>x.cwu_upper), c:'#ec4899'},
                {l:'Ładowanie (BT6)', d:d.map(x=>x.cwu_load), c:'#fb7185'}
            ]);

            plot('c-sys', 'PARAMETRY PRACY', lbl, [
                {l:'Sprężarka (Hz)', d:d.map(x=>x.compressor_hz), c:'#10b981'},
                {l:'Stopniominuty', d:d.map(x=>x.degree_minutes), c:'#facc15'}
            ]);
        }

        function plot(id, title, labels, sets) {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type:'line',
                data: {
                    labels: labels,
                    datasets: sets.map(s => ({
                        label:s.l, data:s.d, borderColor:s.c, backgroundColor:s.c+'11',
                        pointRadius: labels.length > 200 ? 0 : 3, 
                        tension:0.3, borderWidth:2, 
                        fill:false, borderDash: s.dashed ? [5,5] : [],
                        spanGaps: true // ŁĄCZENIE PRZERWANYCH LINII
                    }))
                },
                options: {
                    responsive:true, maintainAspectRatio:false,
                    layout: { padding: { right: 40 } }, // Miejsce na labele
                    plugins: { 
                        title:{display:true, text:title, color:'#fff', font:{size:13}},
                        legend:{position:'bottom', labels:{color:'#64748b', boxWidth:10, font:{size:10}}},
                        datalabels: {
                            align: 'right',
                            anchor: 'end',
                            offset: 4,
                            color: (ctx) => ctx.dataset.borderColor,
                            font: { size: 10, weight: 'bold' },
                            formatter: (val, ctx) => {
                                // Pokazuj tylko dla ostatniego punktu
                                return ctx.dataIndex === ctx.dataset.data.length - 1 ? val : null;
                            }
                        }
                    },
                    scales: { 
                        x:{ ticks:{color:'#475569', font:{size:9}, maxTicksLimit:10}, grid:{display:false} },
                        y:{ grid:{color:'#1f2937'}, ticks:{color:'#475569', font:{size:9}} }
                    }
                }
            });
        }

        document.getElementById('filter-group').onclick = (e) => {
            if(e.target.tagName !== 'BUTTON') return;
            document.querySelectorAll('#filter-group button').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            e.target.classList.add('bg-blue-600', 'text-white');
            render(parseInt(e.target.dataset.hrs));
        };

        start();
    </script>
</body>
</html>
