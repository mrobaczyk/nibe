<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE Monitor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="web/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-200 p-2 md:p-4 font-sans selection:bg-blue-500/30 overflow-x-hidden">
    <div class="max-w-[1600px] mx-auto">

        <header class="flex flex-wrap items-center justify-between gap-4 px-2 mb-6 border-b border-slate-900 pb-6">
            <div class="flex items-center gap-4">
                <div id="update-info"
                    class="flex items-center gap-2 text-blue-500 font-mono text-xs font-black uppercase tracking-widest bg-blue-500/5 px-4 py-2.5 rounded-lg border border-blue-500/20 shadow-inner">
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <div id="date-context-container"
                    class="flex items-center bg-blue-600/10 h-11 px-3 rounded-xl border border-blue-500/20 gap-2">
                    <button id="prev-period"
                        class="p-2 text-blue-400 hover:text-blue-300 hover:bg-blue-500/10 rounded-lg transition-all active:scale-75"
                        title="Poprzedni okres">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>

                    <span id="current-period-label"
                        class="text-xs font-black min-w-[120px] text-center uppercase tracking-tight text-blue-400 select-none">Dzisiaj</span>

                    <button id="next-period"
                        class="p-2 text-blue-400 hover:text-blue-300 hover:bg-blue-500/10 rounded-lg transition-all active:scale-75"
                        title="Następny okres">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <div id="filter-group"
                        class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 h-11 items-center">
                    </div>
                </div>
            </div>
        </header>

        <section id="kpi-container" class="mb-6">
            <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-3"></div>
            <div id="kpi-trends"
                class="grid grid-cols-2 md:grid-cols-4 gap-4 opacity-80 border-t border-slate-900 pt-3"></div>
        </section>

        <main class="relative min-h-[600px]">
            <div id="live-view" class="chart-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </main>
    </div>

    <script type="module" src="web/app.js"></script>
</body>

</html>
