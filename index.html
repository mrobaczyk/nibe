<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIBE Monitor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="web/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-slate-950 text-slate-200 px-2 pb-2 md:px-4 md:pb-4 font-sans selection:bg-blue-500/30 overflow-x-hidden min-h-screen flex flex-col">
    <div id="auth-overlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-950/80 backdrop-blur-xl" style="display: none;">
        <div class="bg-slate-900 p-8 rounded-2xl border border-blue-500/20 shadow-[0_0_60px_-12px_rgba(59,130,246,0.3)] w-80 text-center flex flex-col items-center">
            
            <div class="mb-6 text-blue-500 bg-blue-500/10 p-4 rounded-full border border-blue-500/20 flex items-center justify-center">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>

            <h2 class="text-white text-xl font-bold mb-4">Dostęp chroniony</h2>
            
            <input type="password" id="pass-input" 
                class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white mb-4 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-center" 
                placeholder="Podaj hasło...">
            <button id="auth-btn" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                Zaloguj
            </button>
            <p id="auth-error" class="text-red-400 text-sm mt-3 hidden italic">Nieprawidłowe hasło!</p>
        </div>
    </div>
    <div class="max-w-[1600px] mx-auto w-full flex-grow flex flex-col">
        <header
            class="sticky-header flex-none flex flex-col lg:flex-row items-center justify-between gap-3 px-4 pt-2 pb-2 lg:pt-4 lg:pb-3 w-full max-w-full overflow-hidden">
            <div class="w-full lg:w-auto flex-none">
                <div id="update-info"
                    class="flex flex-nowrap items-center justify-center lg:justify-start gap-3 bg-blue-500/5 px-4 h-10 lg:h-14 rounded-xl border border-blue-500/20 shadow-inner w-full whitespace-nowrap overflow-hidden">
                </div>
            </div>

            <div class="flex flex-col md:flex-row items-center gap-3 w-full flex-1 min-w-0">
                <div id="date-navigator"
                    class="flex-none md:min-w-[400px] md:flex-1 w-full flex justify-center items-center h-14 bg-slate-900/50 rounded-xl border border-slate-800">
                </div>
                <div id="filter-group"
                    class="flex-1 w-full min-w-0 flex items-center justify-start bg-slate-900 p-1 rounded-xl border border-slate-800 h-10 md:h-14 shadow-lg overflow-x-auto whitespace-nowrap scrollbar-hide snap-x transition-all">
                </div>
            </div>
        </header>

        <main class="flex-grow flex flex-col px-4 pb-4">
            <section id="kpi-container" class="mb-6 flex-none">
                <div id="kpi-expert" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-3"></div>
            </section>

            <div id="live-view" class="chart-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 flex-grow">
            </div>
        </main>
    </div>

    <script src="web/auth.js"></script>
    <script type="module" src="web/app.js"></script>
</body>

</html>
